# Build Windows + release GitHub + latest.json (updater) au push d'un tag v*.*
# Prérequis : secret TAURI_SIGNING_PRIVATE_KEY (contenu du fichier .key)

name: Release CRM W.Y.S

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier tag vs version (3 fichiers)
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep -m1 '^version' src-tauri/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "Tag git: v$TAG"
          echo "package.json: $PKG | tauri.conf.json: $TAURI | Cargo.toml: $CARGO"
          for V in "$PKG" "$TAURI" "$CARGO"; do
            if [ "$TAG" != "$V" ]; then
              echo "::error::Le tag v$TAG doit correspondre aux 3 versions ($PKG / $TAURI / $CARGO)"
              exit 1
            fi
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: CRM W.Y.S ${{ github.ref_name }}
          releaseBody: |
            ## Installation
            - Télécharger **CRM.W.Y.S_*_x64-setup.exe** ci-dessous
            - Installer par-dessus l'ancienne version (données conservées)
            - Ou : ouvrir le CRM → **Paramètres → Mises à jour** → Installer

            ## Fichiers updater
            - `latest.json` + `.sig` : mises à jour automatiques dans l'app
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          generateReleaseNotes: true
          tauriScript: npm run tauri
          args: --bundles nsis
