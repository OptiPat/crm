# Build Windows + macOS, release GitHub + latest.json (updater) au push d'un tag v*.*
# Prérequis : secret TAURI_SIGNING_PRIVATE_KEY (contenu du fichier .key)
# macOS d'abord, puis Windows : évite la course sur latest.json (tauri-action #1270).

name: Release CRM W.Y.S

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-macos:
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      MACOSX_DEPLOYMENT_TARGET: "10.15"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier tag vs version (3 fichiers)
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep -m1 '^version' src-tauri/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "Tag git: v$TAG"
          echo "package.json: $PKG | tauri.conf.json: $TAURI | Cargo.toml: $CARGO"
          for V in "$PKG" "$TAURI" "$CARGO"; do
            if [ "$TAG" != "$V" ]; then
              echo "::error::Le tag v$TAG doit correspondre aux 3 versions ($PKG / $TAURI / $CARGO)"
              exit 1
            fi
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Test Trousseau macOS
        working-directory: src-tauri
        run: cargo test email::secret_storage::macos_tests

      - name: Build & publish release (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LICENSE_REGISTRY_URL: ${{ secrets.LICENSE_REGISTRY_URL }}
          LICENSE_REGISTRY_TOKEN: ${{ secrets.LICENSE_REGISTRY_TOKEN }}
          LICENSE_SIGNING_SECRET: ${{ secrets.LICENSE_SIGNING_SECRET }}
          NOTES_REGISTRY_URL: ${{ secrets.NOTES_REGISTRY_URL }}
          NOTES_REGISTRY_TOKEN: ${{ secrets.NOTES_REGISTRY_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: CRM W.Y.S ${{ github.ref_name }}
          releaseBody: |
            ## Installation Windows
            - Télécharger **CRM.W.Y.S_*_x64-setup.exe** ci-dessous
            - Installer par-dessus l'ancienne version (données conservées)
            - Ou : ouvrir le CRM → **Paramètres → Mises à jour** → Installer

            ## Installation macOS
            - Télécharger **CRM.W.Y.S_*_universal.dmg** ci-dessous
            - Ouvrir le DMG, glisser **CRM W.Y.S** dans Applications
            - Premier lancement : clic droit → **Ouvrir** (app non notarisée, équivalent Windows)

            ## Fichiers updater
            - `latest.json` + `.sig` : mises à jour automatiques dans l'app
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          generateReleaseNotes: true
          retryAttempts: 3
          tauriScript: npm run tauri
          args: --target universal-apple-darwin --bundles app,dmg

  publish-windows:
    needs: publish-macos
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache NSIS (target/.tauri)
        uses: actions/cache@v4
        with:
          path: src-tauri/target/.tauri
          key: nsis-tauri-v0.5.3-${{ runner.os }}
          restore-keys: |
            nsis-tauri-v0.5.3-${{ runner.os }}

      - name: Pre-cache NSIS (retry si 504 GitHub)
        shell: pwsh
        run: .\scripts\ci-precache-nsis.ps1

      - name: Install NASM (legacy Windows build tools)
        run: |
          choco install nasm -y --no-progress
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Build & publish release (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LICENSE_REGISTRY_URL: ${{ secrets.LICENSE_REGISTRY_URL }}
          LICENSE_REGISTRY_TOKEN: ${{ secrets.LICENSE_REGISTRY_TOKEN }}
          LICENSE_SIGNING_SECRET: ${{ secrets.LICENSE_SIGNING_SECRET }}
          NOTES_REGISTRY_URL: ${{ secrets.NOTES_REGISTRY_URL }}
          NOTES_REGISTRY_TOKEN: ${{ secrets.NOTES_REGISTRY_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          retryAttempts: 3
          tauriScript: npm run tauri
          args: --bundles nsis

  finalize-updater-json:
    needs: [publish-macos, publish-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Générer latest.json multi-plateformes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/ci-merge-latest-json.mjs

      - name: Publier latest.json sur la release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" latest.json --clobber
