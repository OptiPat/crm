name: Security secrets

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  windows-dpapi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Test DPAPI et restauration
        working-directory: src-tauri
        run: |
          cargo test email::secret_storage
          cargo test backup_sidecar

  macos-keychain:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Test Trousseau macOS
        working-directory: src-tauri
        run: cargo test email::secret_storage::macos_tests
