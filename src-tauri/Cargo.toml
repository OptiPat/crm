[package]
name = "patrimoine-crm"
version = "0.3.5"
description = "CRM Desktop pour Conseillers en Gestion de Patrimoine"
authors = ["you"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2.6", features = [] }

[dependencies]
